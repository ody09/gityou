<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد مراقبة الجودة - مصنع لورد</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #0066ff;
    --green: #00e676;
    --red: #ff1744;
    --yellow: #ffd740;
    --text: #e8f0fe;
    --muted: #6b7fa3;
    --font: 'IBM Plex Sans Arabic', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== NAV ===== */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .nav-logo span { color: var(--text); }
  .nav-tabs {
    display: flex;
    gap: 8px;
  }
  .tab-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .tab-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
  }
  .tab-btn:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }
  a.tab-btn { text-decoration: none; }

  /* ===== DASHBOARD PAGE ===== */
  .page { padding: 32px; }
  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .dash-title { font-size: 24px; font-weight: 700; }
  .dash-title span { color: var(--accent); }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    color: var(--muted);
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .lines-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    align-items: stretch;
  }

  .line-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .line-card.has-alert { border-color: var(--red); }
  .line-card.fresh { border-color: var(--green); }
  .line-card.stopped { border-color: #f97316; }
  .line-card.off { border-color: var(--muted); opacity: 0.7; }

  .line-card-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .line-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    font-family: var(--mono);
  }
  .line-product {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .line-status {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 10px;
    font-weight: 600;
  }
  .status-ok { background: rgba(0,230,118,0.15); color: var(--green); }
  .status-alert { background: rgba(255,23,68,0.15); color: var(--red); }
  .status-empty { background: rgba(107,127,163,0.15); color: var(--muted); }
  .status-stopped { background: rgba(249,115,22,0.15); color: #f97316; }
  .status-off { background: rgba(107,127,163,0.15); color: var(--muted); }

  .line-timer {
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .timer-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 12px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 1s linear;
  }
  .timer-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    min-width: 40px;
    text-align: left;
  }

  .line-params {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .param-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .param-item.out-of-range {
    border-color: var(--red);
    background: rgba(255,23,68,0.05);
  }
  .param-item.in-range {
    border-color: rgba(0,230,118,0.3);
  }
  .param-name {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .param-value {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .param-value.ok { color: var(--green); }
  .param-value.bad { color: var(--red); }
  .param-value.empty { color: var(--muted); }
  .param-range {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .no-data-msg {
    grid-column: 1/-1;
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .line-status-bar {
    padding: 8px 18px;
    font-size: 11px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .line-status-bar.running { color: var(--green); }
  .line-status-bar.stopped { color: #f97316; }
  .line-status-bar.off { color: var(--muted); }

  @media (max-width: 900px) {
    .lines-grid { grid-template-columns: repeat(2, 1fr); }
    .page { padding: 20px 16px; }
  }
  @media (max-width: 600px) {
    .lines-grid { grid-template-columns: 1fr; }
    .nav { padding: 12px 16px; flex-direction: column; gap: 10px; }
    .nav-tabs { flex-wrap: wrap; justify-content: center; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div style="font-size:15px;font-weight:800;color:var(--accent);letter-spacing:1px">National Food Stuff Co</div>
    <div style="font-size:11px;font-weight:700;margin-top:3px;font-family:var(--mono);letter-spacing:1.5px">
      <span style="color:var(--yellow)">EST. 1999</span>
      <span style="color:var(--border)"> · </span>
      <span style="color:var(--muted);font-weight:400" id="today-date"></span>
    </div>
  </div>
  <div class="nav-tabs">
    <a href="/index.html" class="tab-btn">🏠 القائمة الرئيسية</a>
    <a href="settings.html" class="tab-btn">⚙️ الإعدادات</a>
  </div>
</nav>

<div class="page">
  <div class="dash-header">
    <div class="dash-title">مراقبة خطوط الإنتاج <span>الستة</span></div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="current-time">--:--:--</span>
    </div>
  </div>
  <div class="lines-grid" id="lines-grid"></div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
