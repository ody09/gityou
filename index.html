<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>القائمة الرئيسية</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--accent:#06b6d4;--text:#e6eef8}
    html,body{height:100%;margin:0;font-family:IBM Plex Sans Arabic, sans-serif;background:linear-gradient(180deg,#071230 0%, #071a2d 100%);color:var(--text)}
    .wrap{height:100%;display:flex;align-items:center;justify-content:center}
    .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);padding:36px;border-radius:12px;text-align:center;min-width:320px}
    h1{margin:0 0 18px 0;font-size:20px;color:var(--accent)}
    .btns{display:flex;flex-direction:column;gap:12px}
    .nav-btn{background:linear-gradient(90deg,var(--accent),#3b82f6);color:#021028;padding:14px 18px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:16px}
    .nav-btn.secondary{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.06);font-weight:600}
    .small{margin-top:12px;font-size:12px;color:rgba(230,238,248,0.6)}
    a {text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>لوحة الانطلاق</h1>
      <div class="btns">
        <a href="dashboard.html"><button class="nav-btn">📊 الانتقال إلى الداشبورد</button></a>
        <a href="input.html"><button class="nav-btn secondary">✍️ إدخال البيانات</button></a>
        <a href="settings.html"><button class="nav-btn">⚙️ الإعدادات</button></a>
      </div>
      <div class="small">اختر وجهتك لبدء العمل</div>
    </div>
  </div>
</body>
</html>
